<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — PureLeaf</title>
  <meta name="description" content="All articles published on PureLeaf.">
  <meta name="generator" content="PureLeaf">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/main.css">
  <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Pure<span>Leaf</span></a>
      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="blog.html" class="active">Blog</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
          <span class="icon-wrap">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
        </button>
      </div>
    </div>
  </nav>

  <main>

    <div class="blog-header">
      <div class="section-label">All Articles</div>
      <h1>The Blog</h1>
      <p>Every post is a plain <code>.txt</code> file. Add a file, add a line to <code>posts.json</code>, done.</p>
    </div>

    <section class="posts-section" style="padding-top: 1.5rem;">
      <div class="posts-grid" id="posts-grid">
        <div class="loading">Loading posts…</div>
      </div>
    </section>

  </main>

  <footer>
    <p>Built with <strong>PureLeaf</strong> · No backend, no database, just files &nbsp;·&nbsp;
      <a href="about.html">Learn how it works</a></p>
  </footer>

  <script src="js/engine.js"></script>
  <script>
    // ── Theme toggle ──────────────────────────────────────────
    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('click', () => {
      const isLight = document.documentElement.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    // ── Posts ─────────────────────────────────────────────────
    async function loadAllPosts() {
      const grid = document.getElementById('posts-grid');
      try {
        const res   = await fetch('posts.json');
        const posts = await res.json();
        grid.innerHTML = posts.map((post, i) => `
          <article class="post-card fade-in" style="animation-delay:${i * 0.07}s">
            ${post.image ? `<div class="post-card-image"><img src="${PureLeaf.escape(post.image)}" alt="${PureLeaf.escape(post.title)}" loading="lazy"></div>` : ''}
            <div class="post-card-category">${PureLeaf.escape(post.category)}</div>
            <h3>${PureLeaf.escape(post.title)}</h3>
            <p>${PureLeaf.escape(post.excerpt)}</p>
            <div class="post-card-meta">
              <span>${PureLeaf.formatDate(post.date)}</span>
              <a href="blog/${encodeURIComponent(post.slug)}" class="post-card-link">Read →</a>
            </div>
          </article>
        `).join('');
      } catch (err) {
        grid.innerHTML = '<p style="color:var(--danger)">Could not load posts.</p>';
      }
    }

    loadAllPosts();
  </script>

</body>
</html>
