<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — PureLeaf</title>
  <meta name="generator" content="PureLeaf">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/main.css">
  <script>if(localStorage.getItem('theme')==='light')document.body.classList.add('light');</script>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Pure<span>Leaf</span></a>
      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="blog.html" class="active">Blog</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
          <span class="icon-wrap">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
        </button>
      </div>
    </div>
  </nav>

  <main>

    <header class="article-header" id="article-header">
      <div class="loading">Loading…</div>
    </header>

    <div class="article-hero-wrap">
      <div class="article-hero-image" id="article-hero"></div>
    </div>

    <div class="article-body">
      <a href="blog.html" class="back-link">← Back to Blog</a>
      <div class="article-content" id="article-content"></div>
    </div>

  </main>

  <footer>
    <p>Built with <strong>PureLeaf</strong> · No backend, no database, just files &nbsp;·&nbsp;
      <a href="about.html">Learn how it works</a></p>
  </footer>

  <script src="js/engine.js"></script>
  <script>
    // ── Theme toggle ──────────────────────────────────────────
    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    // ── Article loader ────────────────────────────────────────
    async function loadPost() {
      const slug    = PureLeaf.getParam('slug');
      const header  = document.getElementById('article-header');
      const content = document.getElementById('article-content');

      if (!slug) {
        header.innerHTML = '<p style="color:var(--danger)">No article specified.</p>';
        return;
      }

      try {
        const res   = await fetch('posts.json');
        const posts = await res.json();
        const post  = posts.find(p => p.slug === slug);

        if (!post) {
          header.innerHTML = '<p style="color:var(--danger)">Article not found.</p>';
          return;
        }

        document.title = `${post.title} — PureLeaf`;

        header.innerHTML = `
          <span class="article-category">${PureLeaf.escape(post.category)}</span>
          <h1>${PureLeaf.escape(post.title)}</h1>
          <div class="article-meta">${PureLeaf.formatDate(post.date)}</div>
        `;

        if (post.image) {
          const heroEl = document.getElementById('article-hero');
          heroEl.innerHTML = `<img src="${PureLeaf.escape(post.image)}" alt="${PureLeaf.escape(post.title)}" loading="lazy">`;
        }

        await PureLeaf.render(`posts/${slug}.txt`, content, { skipTitle: true });

      } catch (err) {
        header.innerHTML = '<p style="color:var(--danger)">Failed to load article.</p>';
        console.error(err);
      }
    }

    loadPost();
  </script>

</body>
</html>
